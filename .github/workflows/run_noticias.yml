name: Generar Noticias

permissions:
  contents: write

on:
  schedule:
    # 08:00, 10:00, 12:00, 15:00 y 18:00 de Argentina (UTC-3).
    - cron: '0 11,13,15,18,21 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restaurar cache IA
        uses: actions/cache@v4
        with:
          path: .cache_ai.json
          key: groq-cache-${{ github.run_id }}
          restore-keys: |
            groq-cache-

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Ejecutar script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main_web.py

      - name: Subir cambios
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add index.html
          git commit -m "update automatico" || echo "no changes"
          git push
